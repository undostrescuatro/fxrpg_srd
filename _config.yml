# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.

title: FxRPG
email: FxRPG@example.com
description: >- # this means to ignore newlines until "baseurl:"
  Open source simulation focused RPG system
# baseurl: '' # the subpath of your site, e.g. /blog
url: "https://undostrescuatro.github.io/fxrpg_srd" # the base hostname & protocol for your site, e.g. http://example.com
twitter_username: https://x.com/puchihaku
github_username: https://github.com/undostrescuatro
aux_links: # remove if you don't want this link to appear on your pages
  Template Repository: https://github.com/undostrescuatro/fxrpg_srd

# Build settings
# theme: minima
theme: just-the-docs
plugins:
  - jekyll-feed
  - just-the-docs

### just-the-docs configuration

# Set a path/url to a logo that will be displayed instead of the title
logo: "/assets/unnamed.png"

# Set a path/url to a favicon that will be displayed by the browser
# favicon_ico: "/assets/images/favicon.ico"

# Color scheme supports "light" (default) and "dark"
color_scheme: dark

# Callouts create styled squares to wrap up content
# Ex: warning would wrap a paragraph in a red square with a title WARING
# Make your own!
# Default colors: grey-lt,grey-dk,purple,blue,green,yellow, and red
# for custom colors define its 000 and 300 levels in your scss files.

callouts:
  warning:
    title: Warning
    color: red
  note:
    title: Note
    color: blue
  example:
    title: Example
    color: yellow

math: katex

# Define Jekyll collections
#collections:
#  # Define a collection named "rules", its documents reside in the "_rules" directory
#  rules:
#    permalink: "/:collection/:path/"
#    output: true
#  posts:
#    permalink: "/:collection/:path/"
#    output: true

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "posts"

